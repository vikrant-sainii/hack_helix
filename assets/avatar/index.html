<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISL Avatar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e1a; overflow: hidden; font-family: sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; position: relative; }
    canvas { display: block; }

    /* Subtitle / Gloss Bar */
    #subtitle-bar {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 8px 16px;
      background: rgba(0,0,0,0.5);
      border-radius: 24px;
      backdrop-filter: blur(8px);
    }
    .gloss-chip {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s ease;
    }
    .gloss-chip.active {
      color: #ffffff;
      background: #6c63ff;
      border-color: #6c63ff;
      box-shadow: 0 0 12px rgba(108,99,255,0.6);
    }
    .gloss-chip.done {
      color: rgba(255,255,255,0.6);
      border-color: rgba(255,255,255,0.2);
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(108,99,255,0.3);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="canvas-container">
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading avatar...</span>
  </div>
  <div id="subtitle-bar"></div>
</div>

<!--
  TODO: Implement Three.js avatar with:
  - Mixamo Y-Bot GLTF
  - TWEEN.js bone rotations
  - window.playSequence(signs) entry point
  - FlutterBridge.postMessage() callbacks
  - NMM blendshape mapping
  - Idle breathing animation
-->
<script>
  // ─── Placeholder Bridge ────────────────────────────────────────────────────
  // window.playSequence will be fully implemented in the Three.js build phase.
  // This stub lets the Flutter WebView load without errors.

  let _currentSigns = [];
  let _currentIndex = 0;

  window.playSequence = function(signs) {
    console.log('[ISL] playSequence called with', signs.length, 'signs');
    _currentSigns = signs;
    _currentIndex = 0;
    _updateSubtitleBar(signs, -1);
    _playNext();
  };

  function _playNext() {
    if (_currentIndex >= _currentSigns.length) {
      // Notify Flutter sequence completed
      if (window.FlutterBridge) {
        FlutterBridge.postMessage(JSON.stringify({ type: 'sequenceCompleted' }));
      }
      _updateSubtitleBar(_currentSigns, -1);
      return;
    }

    const sign = _currentSigns[_currentIndex];
    console.log('[ISL] Playing sign:', sign.gloss, 'for', sign.duration_ms, 'ms');

    // Notify Flutter which sign started
    if (window.FlutterBridge) {
      FlutterBridge.postMessage(JSON.stringify({
        type: 'signStarted',
        index: _currentIndex
      }));
    }

    _updateSubtitleBar(_currentSigns, _currentIndex);

    // TODO: trigger Three.js bone tweens here
    // For now, wait duration_ms then play next
    setTimeout(() => {
      _currentIndex++;
      _playNext();
    }, sign.duration_ms); // duration_ms already in ms from FastAPI — never convert here
  }

  function _updateSubtitleBar(signs, activeIndex) {
    const bar = document.getElementById('subtitle-bar');
    if (!bar) return;
    bar.innerHTML = signs.map((s, i) => {
      let cls = 'gloss-chip';
      if (i === activeIndex) cls += ' active';
      else if (i < activeIndex) cls += ' done';
      return `<span class="${cls}">${s.gloss}</span>`;
    }).join('');
  }

  // Hide loading overlay once page is ready
  window.addEventListener('load', () => {
    const loading = document.getElementById('loading');
    if (loading) loading.style.display = 'none';
  });
</script>
</body>
</html>
