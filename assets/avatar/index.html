<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISL Translator - CrisisMatch AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #0A0E1A !important; 
            font-family: sans-serif; 
        }
        canvas { display: block; }

        #load-overlay {
            position: fixed; inset: 0;
            background: rgba(10, 14, 26, 0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 200;
            transition: opacity 0.6s ease;
        }
        #load-overlay.hidden { opacity: 0; pointer-events: none; }

        #load-logo {
            font-size: 40px; font-weight: 800; letter-spacing: 2px;
            background: linear-gradient(135deg, #6c63ff, #00e5ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }
        #load-track {
            width: 180px; height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 999px; overflow: hidden;
        }
        #load-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #6c63ff, #00e5ff);
            border-radius: 999px;
            transition: width 0.2s ease;
        }
    </style>
</head>
<body>

<div id="load-overlay">
    <div id="load-logo">ISL</div>
    <div id="load-track"><div id="load-bar"></div></div>
</div>

<script>/* THREE_PLACEHOLDER */</script>
<script>/* GLTF_PLACEHOLDER */</script>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// SCENE SETUP
// ─────────────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0A0E1A); 

const camera = new THREE.PerspectiveCamera(
    45, window.innerWidth / window.innerHeight, 0.1, 1000
);
camera.position.set(0, 0.6, 5.5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0); 
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(2, 4, 3);
scene.add(dirLight);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─────────────────────────────────────────────────────────────────────────────
// STATIC NMM DICTIONARY (For general moods)
// ─────────────────────────────────────────────────────────────────────────────
const faceDictionary = {
    'neutral'  : {},
    'happy'    : { mouthSmile: 0.8, cheekSquintLeft: 0.5, cheekSquintRight: 0.5 },
    'serious'  : { browDownLeft: 0.8, browDownRight: 0.8, mouthPressLeft: 0.5, mouthPressRight: 0.5 },
    'alert'    : { eyeWideLeft: 0.9, eyeWideRight: 0.9, browInnerUp: 0.8, jawOpen: 0.2 },
    'pleading' : { browInnerUp: 1.0, mouthFrownLeft: 0.3, mouthFrownRight: 0.3, eyeSquintLeft: 0.2, eyeSquintRight: 0.2 },
    'angry'    : { browDownLeft: 1.0, browDownRight: 1.0, mouthFrownLeft: 0.7, mouthFrownRight: 0.7, noseSneerLeft: 0.5, noseSneerRight: 0.5 }
};

const headDictionary = {
    'neutral' : [0, 0, 0],
    'forward' : [0.3, 0, 0]
};

// ─────────────────────────────────────────────────────────────────────────────
// AVATAR STATE
// ─────────────────────────────────────────────────────────────────────────────
let avatar           = null;
let headBone         = null;
let rightArmBone     = null;
let rightForeArmBone = null;
let leftArmBone      = null;
let leftForeArmBone  = null;
let morphMeshes      = []; 

function applyStaticNMM(nmmData) {
    if (!nmmData || !avatar) return;

    if (headBone && nmmData.head) {
        const rot = headDictionary[nmmData.head] || headDictionary['neutral'];
        headBone.rotation.set(rot[0], rot[1], rot[2]);
    }
}

// ─────────────────────────────────────────────────────────────────────────────
// VECTOR ANIMATION ENGINE (LANDMARKS → ROTATIONS)
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Maps a true 3D direction vector to a Mixamo bone's rotation.
 * Handles Local vs World space and Mixamo's +Y Rest Pose.
 */
function setBoneOrientation(bone, startVec, endVec) {
    if (!bone || !startVec || !endVec) return;

    // 1. Calculate direction and map to Three.js World Space axes
    const targetDir = new THREE.Vector3(
        (endVec[0] - startVec[0]),
        -(endVec[1] - startVec[1]), 
        -(endVec[2] - startVec[2])
    );

    if (targetDir.lengthSq() === 0) return;
    targetDir.normalize();

    // 2. Prevent the "Pretzel Effect" (Local Space Conversion)
    if (bone.parent) {
        bone.parent.updateMatrixWorld(true); 
        const parentInverse = new THREE.Matrix4().copy(bone.parent.matrixWorld).invert();
        targetDir.transformDirection(parentInverse);
    }

    // 3. Mixamo T-Pose Default Direction (+Y Axis)
    const boneRestDir = new THREE.Vector3(0, 1, 0);

    // 4. Apply the clean rotation
    const quat = new THREE.Quaternion().setFromUnitVectors(boneRestDir, targetDir);
    bone.quaternion.copy(quat);
}

const clock = new THREE.Clock();

let activeSign       = null;
let signStartTime    = 0;
let sequenceQueue    = [];
let sequenceIndex    = 0;
let isPlayingSequence = false;
let loopSequence      = true;  
let currentSignsHash  = '';

function lerp(start, end, t) { return start + (end - start) * t; }

function lerpVec(a, b, t) {
    if (!a || !b) return null;
    return [
        lerp(a[0], b[0], t),
        lerp(a[1], b[1], t),
        lerp(a[2], b[2], t)
    ];
}

function animate() {
    requestAnimationFrame(animate);

    if (isPlayingSequence && activeSign && avatar) {
        const elapsed = clock.getElapsedTime() - signStartTime;
        const duration = (activeSign.duration_ms !== undefined ? activeSign.duration_ms / 1000 : activeSign.duration);

        if (elapsed >= duration) {
            sequenceIndex++;
            if (sequenceIndex >= sequenceQueue.length) {
                if (loopSequence) {
                    sequenceIndex = 0;
                } else {
                    isPlayingSequence = false;
                    activeSign = null;
                    if (window.FlutterBridge) {
                        FlutterBridge.postMessage(JSON.stringify({ type: 'sequenceCompleted' }));
                    }
                    return;
                }
            }
            const nextSign = sequenceQueue[sequenceIndex];
            activeSign = nextSign;
            signStartTime = clock.getElapsedTime();

            applyStaticNMM(nextSign.nmm);

            if (window.FlutterBridge) {
                FlutterBridge.postMessage(JSON.stringify({ type: 'signStarted', index: sequenceIndex }));
            }
        } else {
            const frames = activeSign.keyframes;
            let frameA = frames[0];
            let frameB = frames[frames.length - 1];

            for (let i = 0; i < frames.length - 1; i++) {
                if (elapsed >= frames[i].time && elapsed <= frames[i + 1].time) {
                    frameA = frames[i];
                    frameB = frames[i + 1];
                    break;
                }
            }

            const segDur = frameB.time - frameA.time;
            const progress = segDur > 0 ? (elapsed - frameA.time) / segDur : 1;

            // ── Dynamic Facial Expressions (NMMs) ────────────────────
            let morphWeights = {
                jawOpen: 0, mouthSmile: 0, 
                blinkLeft: 0, blinkRight: 0, 
                browUpLeft: 0, browUpRight: 0, browDown: 0
            };

            if (frameA.Face && frameB.Face && frameA.Face.jaw_top) {
                const jawT = lerpVec(frameA.Face.jaw_top, frameB.Face.jaw_top, progress);
                const jawB = lerpVec(frameA.Face.jaw_bottom, frameB.Face.jaw_bottom, progress);
                const mouthL = lerpVec(frameA.Face.mouth_left, frameB.Face.mouth_left, progress);
                const mouthR = lerpVec(frameA.Face.mouth_right, frameB.Face.mouth_right, progress);
                const eyeLT = lerpVec(frameA.Face.eye_left_top, frameB.Face.eye_left_top, progress);
                const eyeLB = lerpVec(frameA.Face.eye_left_bottom, frameB.Face.eye_left_bottom, progress);
                const eyeRT = lerpVec(frameA.Face.eye_right_top, frameB.Face.eye_right_top, progress);
                const eyeRB = lerpVec(frameA.Face.eye_right_bottom, frameB.Face.eye_right_bottom, progress);
                const browL = lerpVec(frameA.Face.brow_left, frameB.Face.brow_left, progress);
                const browR = lerpVec(frameA.Face.brow_right, frameB.Face.brow_right, progress);

                if (jawT && jawB && mouthL && mouthR && eyeLT && eyeLB && eyeRT && eyeRB && browL && browR) {
                    const calcDist = (p1, p2) => Math.hypot(p2[0]-p1[0], p2[1]-p1[1], p2[2]-p1[2]);

                    // Jaw & Lips
                    morphWeights.jawOpen = Math.min(1.0, calcDist(jawT, jawB) * 25);
                    morphWeights.mouthSmile = Math.max(0, Math.min(1.0, (calcDist(mouthL, mouthR) - 0.08) * 20));

                    // Blinks
                    morphWeights.blinkLeft = calcDist(eyeLT, eyeLB) < 0.012 ? 1.0 : 0.0;
                    morphWeights.blinkRight = calcDist(eyeRT, eyeRB) < 0.012 ? 1.0 : 0.0;

                    // Brows
                    let leftBrowDist = calcDist(browL, eyeLT);
                    let rightBrowDist = calcDist(browR, eyeRT);
                    morphWeights.browUpLeft = Math.max(0, Math.min(1.0, (leftBrowDist - 0.04) * 30));
                    morphWeights.browUpRight = Math.max(0, Math.min(1.0, (rightBrowDist - 0.04) * 30));
                    morphWeights.browDown = Math.max(0, Math.min(1.0, (0.035 - leftBrowDist) * 40));
                }
            }

            // Apply dynamic face weights to meshes
            for (let mesh of morphMeshes) {
                const dict = mesh.morphTargetDictionary;
                if (!dict) continue;

                if (dict['jawOpen'] !== undefined) mesh.morphTargetInfluences[dict['jawOpen']] = morphWeights.jawOpen;
                if (dict['mouthSmile'] !== undefined) mesh.morphTargetInfluences[dict['mouthSmile']] = morphWeights.mouthSmile;
                if (dict['eyeBlinkLeft'] !== undefined) mesh.morphTargetInfluences[dict['eyeBlinkLeft']] = morphWeights.blinkLeft;
                if (dict['eyeBlinkRight'] !== undefined) mesh.morphTargetInfluences[dict['eyeBlinkRight']] = morphWeights.blinkRight;
                
                if (dict['browInnerUp'] !== undefined) {
                    mesh.morphTargetInfluences[dict['browInnerUp']] = Math.max(morphWeights.browUpLeft, morphWeights.browUpRight);
                }
                if (dict['browDownLeft'] !== undefined) mesh.morphTargetInfluences[dict['browDownLeft']] = morphWeights.browDown;
                if (dict['browDownRight'] !== undefined) mesh.morphTargetInfluences[dict['browDownRight']] = morphWeights.browDown;
            }

            // ── Right Arm ──────────────────────────────────────────
            if (frameA.RightArm && frameB.RightArm) {
                const s = lerpVec(frameA.RightArm.shoulder, frameB.RightArm.shoulder, progress);
                const e = lerpVec(frameA.RightArm.elbow,    frameB.RightArm.elbow,    progress);
                const w = lerpVec(frameA.RightArm.wrist,    frameB.RightArm.wrist,    progress);
                
                if (s && e && w) {
                    setBoneOrientation(rightArmBone, s, e);
                    setBoneOrientation(rightForeArmBone, e, w);
                }
            }

            // ── Left Arm ───────────────────────────────────────────
            if (frameA.LeftArm && frameB.LeftArm) {
                const s = lerpVec(frameA.LeftArm.shoulder, frameB.LeftArm.shoulder, progress);
                const e = lerpVec(frameA.LeftArm.elbow,    frameB.LeftArm.elbow,    progress);
                const w = lerpVec(frameA.LeftArm.wrist,    frameB.LeftArm.wrist,    progress);
                
                if (s && e && w) {
                    setBoneOrientation(leftArmBone, s, e);
                    setBoneOrientation(leftForeArmBone, e, w);
                }
            }
        }
    }

    renderer.render(scene, camera);
}
animate();

// ─────────────────────────────────────────────────────────────────────────────
// FLUTTER → JS API
// ─────────────────────────────────────────────────────────────────────────────

window.playSequence = function(signsJson) {
    const signs = (typeof signsJson === 'string') ? JSON.parse(signsJson) : signsJson;
    if (!signs || signs.length === 0) return;

    const newHash = JSON.stringify(signs);
    if (newHash === currentSignsHash && isPlayingSequence) return;
    currentSignsHash = newHash;

    sequenceQueue     = signs;
    sequenceIndex     = 0;
    isPlayingSequence = true;
    loopSequence      = true;   
    activeSign        = signs[0];
    signStartTime     = clock.getElapsedTime();

    applyStaticNMM(signs[0].nmm);

    if (window.FlutterBridge) {
        FlutterBridge.postMessage(JSON.stringify({ type: 'signStarted', index: 0 }));
    }
};

window.resetAvatar = function() {
    isPlayingSequence = false;
    currentSignsHash = '';
    activeSign = null;
    sequenceQueue = [];
    applyStaticNMM({ face: 'neutral', head: 'neutral' });
    if (rightArmBone) rightArmBone.rotation.set(0, 0, 0);
    if (leftArmBone)  leftArmBone.rotation.set(0, 0, 0);
    if (headBone)     headBone.rotation.set(0, 0, 0);
};

// ─────────────────────────────────────────────────────────────────────────────
// GLB LOADING
// ─────────────────────────────────────────────────────────────────────────────
window._glbChunks = [];

window.assembleAndLoadGLB = function() {
    const lb = document.getElementById('load-bar');
    if (lb) lb.style.width = '95%';

    const b64 = window._glbChunks.join('');
    window._glbChunks = []; 

    const binStr = atob(b64);
    const len    = binStr.length;
    const bytes  = new Uint8Array(len);
    for (let i = 0; i < len; i++) bytes[i] = binStr.charCodeAt(i);

    const loader = new THREE.GLTFLoader();
    loader.parse(bytes.buffer, '', (gltf) => {
        avatar = gltf.scene;
        scene.add(avatar);

        rightArmBone = avatar.getObjectByName('mixamorigRightArm') 
                    || avatar.getObjectByName('RightArm');
        rightForeArmBone = avatar.getObjectByName('mixamorigRightForeArm')
                    || avatar.getObjectByName('RightForeArm');
        
        leftArmBone  = avatar.getObjectByName('mixamorigLeftArm')
                    || avatar.getObjectByName('LeftArm');
        leftForeArmBone = avatar.getObjectByName('mixamorigLeftForeArm')
                    || avatar.getObjectByName('LeftForeArm');
                    
        headBone     = avatar.getObjectByName('mixamorigHead')
                    || avatar.getObjectByName('Head');

        morphMeshes = [];
        avatar.traverse((node) => {
            if (node.isMesh && node.morphTargetDictionary) {
                morphMeshes.push(node);
            }
        });

        const box    = new THREE.Box3().setFromObject(avatar);
        const size   = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());

        const targetHeight = 2.4;
        const scale = targetHeight / size.y;
        avatar.scale.setScalar(scale);

        box.setFromObject(avatar);
        box.getCenter(center);
        avatar.position.sub(center);
        avatar.position.y += 0.3; 

        camera.lookAt(0, 0.7, 0);

        if (lb) lb.style.width = '100%';

        setTimeout(() => {
            const overlay = document.getElementById('load-overlay');
            if (overlay) overlay.classList.add('hidden');
        }, 400);

        if (window.FlutterBridge) {
            FlutterBridge.postMessage(JSON.stringify({ type: 'ready' }));
        }
    }, (err) => {
        console.error('GLB parse error:', err);
        if (lb) { lb.style.background = '#e74c3c'; lb.style.width = '100%'; }
    });
};
</script>
</body>
</html>
