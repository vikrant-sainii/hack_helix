<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISL Translator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #0a0e1a; font-family: sans-serif; }
        canvas { display: block; }

        #load-overlay {
            position: fixed; inset: 0;
            background: #0a0e1a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 200;
            transition: opacity 0.6s ease;
        }
        #load-overlay.hidden { opacity: 0; pointer-events: none; }

        #load-logo {
            font-size: 48px; font-weight: 800; letter-spacing: 2px;
            background: linear-gradient(135deg, #6c63ff, #00e5ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 32px;
        }
        #load-track {
            width: 220px; height: 4px;
            background: rgba(255,255,255,0.12);
            border-radius: 999px; overflow: hidden;
        }
        #load-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #6c63ff, #00e5ff);
            border-radius: 999px;
            transition: width 0.2s ease;
        }
        #load-tip {
            margin-top: 18px;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        /* Current word label */
        #current-word {
            position: fixed;
            bottom: 28px; left: 50%;
            transform: translateX(-50%);
            color: #f1c40f;
            font-size: 34px;
            font-weight: 800;
            z-index: 100;
            text-shadow: 0 2px 12px rgba(0,0,0,0.7);
            letter-spacing: 2px;
            display: none;
        }
        #current-word.visible { display: block; }
    </style>
</head>
<body>

<!-- Loading overlay -->
<div id="load-overlay">
    <div id="load-logo">ISL</div>
    <div id="load-track"><div id="load-bar"></div></div>
    <div id="load-tip">Loading avatar…</div>
</div>

<!-- Current sign word -->
<div id="current-word"></div>

<!-- THREE.JS — injected inline by Flutter (_loadInlinedHtml) -->
<script>/* THREE_PLACEHOLDER */</script>
<!-- GLTF LOADER -->
<script>/* GLTF_PLACEHOLDER */</script>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// SCENE SETUP  (mirrors source/index.html exactly)
// ─────────────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e1a);

const camera = new THREE.PerspectiveCamera(
    75, window.innerWidth / window.innerHeight, 0.1, 1000
);
camera.position.set(0, 1.5, 1.2);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(2, 4, 3);
scene.add(dirLight);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─────────────────────────────────────────────────────────────────────────────
// FACIAL-EXPRESSION DICTIONARY  (from source/index.html)
// ─────────────────────────────────────────────────────────────────────────────
const faceDictionary = {
    'neutral'  : {},
    'happy'    : { mouthSmile: 0.8, cheekSquintLeft: 0.5, cheekSquintRight: 0.5 },
    'serious'  : { browDownLeft: 0.8, browDownRight: 0.8, mouthPressLeft: 0.5, mouthPressRight: 0.5 },
    'alert'    : { eyeWideLeft: 0.9, eyeWideRight: 0.9, browInnerUp: 0.8, jawOpen: 0.2 },
    'pleading' : { browInnerUp: 1.0, mouthFrownLeft: 0.3, mouthFrownRight: 0.3, eyeSquintLeft: 0.2, eyeSquintRight: 0.2 },
    'angry'    : { browDownLeft: 1.0, browDownRight: 1.0, mouthFrownLeft: 0.7, mouthFrownRight: 0.7, noseSneerLeft: 0.5, noseSneerRight: 0.5 }
};

const headDictionary = {
    'neutral' : [0, 0, 0],
    'forward' : [0.3, 0, 0]
};

// ─────────────────────────────────────────────────────────────────────────────
// AVATAR STATE
// ─────────────────────────────────────────────────────────────────────────────
let avatar       = null;
let rightArmBone = null;
let leftArmBone  = null;
let headBone     = null;

// ─────────────────────────────────────────────────────────────────────────────
// NMM  (Non-Manual Markers — face + head)
// ─────────────────────────────────────────────────────────────────────────────
function applyNMM(nmmData) {
    if (!nmmData || !avatar) return;

    if (headBone && nmmData.head) {
        const rot = headDictionary[nmmData.head] || headDictionary['neutral'];
        headBone.rotation.set(rot[0], rot[1], rot[2]);
    }

    const faceSettings = faceDictionary[nmmData.face] || faceDictionary['neutral'];
    avatar.traverse((node) => {
        if (node.isMesh && node.morphTargetDictionary) {
            for (const key in node.morphTargetDictionary) {
                node.morphTargetInfluences[node.morphTargetDictionary[key]] = 0;
            }
            for (const muscle in faceSettings) {
                if (node.morphTargetDictionary[muscle] !== undefined) {
                    node.morphTargetInfluences[node.morphTargetDictionary[muscle]] = faceSettings[muscle];
                }
            }
        }
    });
}

// ─────────────────────────────────────────────────────────────────────────────
// ANIMATION ENGINE  (Frame-based lerp — same style as source/index.html)
// ─────────────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

let activeSign       = null;  // current sign object (from Flutter JSON)
let signStartTime    = 0;
let sequenceQueue    = [];    // array of sign objects
let sequenceIndex    = 0;
let isPlayingSequence = false;
let loopSequence     = false; // Flutter controls looping

function lerp(start, end, t) { return start + (end - start) * t; }

function animate() {
    requestAnimationFrame(animate);

    if (isPlayingSequence && activeSign && avatar) {
        const elapsed = clock.getElapsedTime() - signStartTime;
        const duration = activeSign.duration_ms / 1000;   // convert ms → s

        if (elapsed >= duration) {
            sequenceIndex++;
            if (sequenceIndex >= sequenceQueue.length) {
                if (loopSequence) {
                    sequenceIndex = 0;
                } else {
                    isPlayingSequence = false;
                    activeSign = null;
                    document.getElementById('current-word').classList.remove('visible');
                    // Notify Flutter
                    if (window.FlutterBridge) {
                        FlutterBridge.postMessage(JSON.stringify({ type: 'sequenceCompleted' }));
                    }
                    return;
                }
            }
            const nextSign = sequenceQueue[sequenceIndex];
            activeSign = nextSign;
            signStartTime = clock.getElapsedTime();

            const wordEl = document.getElementById('current-word');
            wordEl.textContent = nextSign.gloss;
            wordEl.classList.add('visible');

            applyNMM(nextSign.nmm);

            // Notify Flutter which sign index started
            if (window.FlutterBridge) {
                FlutterBridge.postMessage(JSON.stringify({ type: 'signStarted', index: sequenceIndex }));
            }
        } else {
            // Lerp between keyframes
            const frames = activeSign.keyframes;
            let frameA = frames[0];
            let frameB = frames[frames.length - 1];

            for (let i = 0; i < frames.length - 1; i++) {
                // keyframes use 'time' in seconds (Flutter sends as-is)
                if (elapsed >= frames[i].time && elapsed <= frames[i + 1].time) {
                    frameA = frames[i];
                    frameB = frames[i + 1];
                    break;
                }
            }

            const segDur = frameB.time - frameA.time;
            const progress = segDur > 0 ? (elapsed - frameA.time) / segDur : 1;

            if (frameA.RightHand && frameB.RightHand && rightArmBone) {
                rightArmBone.rotation.set(
                    lerp(frameA.RightHand[0], frameB.RightHand[0], progress),
                    lerp(frameA.RightHand[1], frameB.RightHand[1], progress),
                    lerp(frameA.RightHand[2], frameB.RightHand[2], progress)
                );
            }
            if (frameA.LeftHand && frameB.LeftHand && leftArmBone) {
                leftArmBone.rotation.set(
                    lerp(frameA.LeftHand[0], frameB.LeftHand[0], progress),
                    lerp(frameA.LeftHand[1], frameB.LeftHand[1], progress),
                    lerp(frameA.LeftHand[2], frameB.LeftHand[2], progress)
                );
            } else if (leftArmBone) {
                leftArmBone.rotation.set(0, 0, 0);
            }
        }
    }

    renderer.render(scene, camera);
}
animate();

// ─────────────────────────────────────────────────────────────────────────────
// FLUTTER → JS API
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Called by Flutter with a JSON array of EnrichedSign objects:
 * [{ gloss, duration_ms, keyframes: [{time, RightHand?, LeftHand?}], nmm: {face, head} }]
 */
window.playSequence = function(signsJson) {
    const signs = (typeof signsJson === 'string') ? JSON.parse(signsJson) : signsJson;
    if (!signs || signs.length === 0) return;

    sequenceQueue    = signs;
    sequenceIndex    = 0;
    isPlayingSequence = true;
    loopSequence     = false;         // no auto-loop from Flutter
    activeSign       = signs[0];
    signStartTime    = clock.getElapsedTime();

    const wordEl = document.getElementById('current-word');
    wordEl.textContent = signs[0].gloss;
    wordEl.classList.add('visible');

    applyNMM(signs[0].nmm);

    if (window.FlutterBridge) {
        FlutterBridge.postMessage(JSON.stringify({ type: 'signStarted', index: 0 }));
    }
};

/** Reset avatar to neutral pose */
window.resetAvatar = function() {
    isPlayingSequence = false;
    activeSign = null;
    sequenceQueue = [];
    document.getElementById('current-word').classList.remove('visible');
    applyNMM({ face: 'neutral', head: 'neutral' });
    if (rightArmBone) rightArmBone.rotation.set(0, 0, 0);
    if (leftArmBone)  leftArmBone.rotation.set(0, 0, 0);
    if (headBone)     headBone.rotation.set(0, 0, 0);
};

// ─────────────────────────────────────────────────────────────────────────────
// GLB LOADING  — Flutter pushes base64 chunks → assembleAndLoadGLB()
// ─────────────────────────────────────────────────────────────────────────────
window._glbChunks = [];

window.assembleAndLoadGLB = function() {
    const lb = document.getElementById('load-bar');
    if (lb) lb.style.width = '95%';

    const b64 = window._glbChunks.join('');
    window._glbChunks = []; // free memory

    // base64 → ArrayBuffer
    const binStr = atob(b64);
    const len    = binStr.length;
    const bytes  = new Uint8Array(len);
    for (let i = 0; i < len; i++) bytes[i] = binStr.charCodeAt(i);

    const loader = new THREE.GLTFLoader();
    loader.parse(bytes.buffer, '', (gltf) => {
        avatar = gltf.scene;
        scene.add(avatar);

        // Bone discovery — try both ReadyPlayerMe and Mixamo naming
        rightArmBone = avatar.getObjectByName('RightArm')
                    || avatar.getObjectByName('mixamorigRightArm');
        leftArmBone  = avatar.getObjectByName('LeftArm')
                    || avatar.getObjectByName('mixamorigLeftArm');
        headBone     = avatar.getObjectByName('Head')
                    || avatar.getObjectByName('mixamorigHead');

        // Centre the avatar
        const box = new THREE.Box3().setFromObject(avatar);
        const center = box.getCenter(new THREE.Vector3());
        avatar.position.sub(center);
        avatar.position.y += (box.max.y - box.min.y) / 2;

        if (lb) lb.style.width = '100%';

        // Hide loader
        setTimeout(() => {
            const overlay = document.getElementById('load-overlay');
            if (overlay) overlay.classList.add('hidden');
        }, 400);

        // Notify Flutter: avatar is ready to receive signs
        if (window.FlutterBridge) {
            FlutterBridge.postMessage(JSON.stringify({ type: 'ready' }));
        }

        console.log('✅ Avatar ready. rightArm:', rightArmBone?.name ?? 'NOT FOUND',
                    'leftArm:', leftArmBone?.name ?? 'NOT FOUND',
                    'head:', headBone?.name ?? 'NOT FOUND');
    }, (err) => {
        console.error('GLB parse error:', err);
        if (lb) { lb.style.background = '#e74c3c'; lb.style.width = '100%'; }
    });
};
</script>
</body>
</html>
